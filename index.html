<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система заявок</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f6fa;
            --text-color: #2c3e50;
            --bug-color: #e74c3c;
            --task-color: #2ecc71;
            --lib-color: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: white;
            width: 100%;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { margin: 0; color: var(--primary-color); }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 250px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover { transform: translateY(-5px); }

        .card.bug { border-top: 5px solid var(--bug-color); }
        .card.task { border-top: 5px solid var(--task-color); }
        .card.lib { border-top: 5px solid var(--lib-color); }

        .card h2 { margin-top: 0; }
        
        button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }

        .close:hover { color: black; }

        form { display: flex; flex-direction: column; gap: 15px; }
        
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        textarea { resize: vertical; min-height: 100px; }

        .status-msg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
        .success { color: green; }
        .error { color: red; }

    </style>
</head>
<body>

<header>
    <h1>Портал заявок</h1>
    <p>Выберите тип обращения</p>
</header>

<div class="container">
    <div class="card bug" onclick="openModal('bugModal')">
        <h2>🐛 Баги</h2>
        <p>Сообщить об ошибке</p>
    </div>
    <div class="card task" onclick="openModal('taskModal')">
        <h2>✅ Задачи</h2>
        <p>Предложить новую функцию</p>
    </div>
    <div class="card lib" onclick="openModal('libModal')">
        <h2>📚 Электронная библиотека</h2>
        <p>Запрос документа</p>
    </div>
</div>

<!-- Модальное окно: Баги -->
<div id="bugModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('bugModal')">&times;</span>
        <h2 style="color: var(--bug-color)">Заявка на баг</h2>
        <form id="bugForm" onsubmit="submitForm(event, 'Баги')">
            <input type="hidden" name="sheetName" value="Баги">
            <input type="text" name="name" placeholder="Ваше имя" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="department" placeholder="Отдел">
            <input type="text" name="subject" placeholder="Тема ошибки" required>
            <textarea name="description" placeholder="Описание проблемы и шаги воспроизведения" required></textarea>
            <select name="priority">
                <option value="Low">Низкий</option>
                <option value="Medium" selected>Средний</option>
                <option value="High">Высокий</option>
                <option value="Critical">Критический</option>
            </select>
            <button type="submit" class="submit-btn" style="background-color: var(--bug-color)">Отправить</button>
            <div class="status-msg"></div>
        </form>
    </div>
</div>

<!-- Модальное окно: Задачи -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('taskModal')">&times;</span>
        <h2 style="color: var(--task-color)">Новая задача</h2>
        <form id="taskForm" onsubmit="submitForm(event, 'Задачи')">
            <input type="hidden" name="sheetName" value="Задачи">
            <input type="text" name="name" placeholder="Ваше имя" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="department" placeholder="Отдел">
            <input type="text" name="subject" placeholder="Название задачи" required>
            <textarea name="description" placeholder="Описание функционала и польза" required></textarea>
            <select name="priority">
                <option value="Low">Низкий</option>
                <option value="Medium" selected>Средний</option>
                <option value="High">Высокий</option>
            </select>
            <button type="submit" class="submit-btn" style="background-color: var(--task-color)">Отправить</button>
            <div class="status-msg"></div>
        </form>
    </div>
</div>

<!-- Модальное окно: Библиотека -->
<div id="libModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('libModal')">&times;</span>
        <h2 style="color: var(--lib-color)">Запрос из библиотеки</h2>
        <form id="libForm" onsubmit="submitForm(event, 'Библиотека')">
            <input type="hidden" name="sheetName" value="Библиотека">
            <input type="text" name="name" placeholder="Ваше имя" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="department" placeholder="Отдел">
            <input type="text" name="subject" placeholder="Название документа/книги" required>
            <textarea name="description" placeholder="Дополнительные требования или ссылка" required></textarea>
            <button type="submit" class="submit-btn" style="background-color: var(--lib-color)">Отправить</button>
            <div class="status-msg"></div>
        </form>
    </div>
</div>

<script>
    // ВСТАВЬТЕ СЮДА ВАШ URL ИЗ GOOGLE APPS SCRIPT
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8ne79G9Fha3k_0Q5oxSijGiESTukN_RjYt3WiF-u6csOHuE0IxhBPsexYnkhSjUFWig/exec';

    function openModal(modalId) {
        document.getElementById(modalId).style.display = 'flex';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    // Закрытие по клику вне окна
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    }

    async function submitForm(event, sheetName) {
        event.preventDefault();
        const form = event.target;
        const statusDiv = form.querySelector('.status-msg');
        const submitBtn = form.querySelector('button[type="submit"]');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправка...';
        statusDiv.textContent = '';
        statusDiv.className = 'status-msg';

        const formData = new FormData(form);

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
                // Важно: не устанавливаем Content-Type вручную для FormData, 
                // браузер сделает это сам с границами (boundary)
            });

            if (response.ok) {
                statusDiv.textContent = 'Заявка успешно отправлена!';
                statusDiv.classList.add('success');
                form.reset();
                setTimeout(() => closeModal(form.parentElement.id), 2000);
            } else {
                throw new Error('Ошибка сервера');
            }
        } catch (error) {
            statusDiv.textContent = 'Ошибка отправки. Попробуйте позже.';
            statusDiv.classList.add('error');
            console.error('Error:', error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Отправить';
        }
    }
</script>

</body>
</html>
