<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления заявками</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2em;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .main-btn {
            padding: 30px 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-bugs {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-tasks {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-library {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .main-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .main-btn:active {
            transform: translateY(-2px);
        }

        .form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .form-modal.active {
            display: flex;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-title {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .success-message.active {
            display: block;
        }

        .success-icon {
            font-size: 60px;
            color: #43e97b;
            margin-bottom: 20px;
        }

        .success-message h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #666;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .button-container {
                grid-template-columns: 1fr;
            }

            .main-btn {
                padding: 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Система управления заявками</h1>
        
        <div class="button-container">
            <button class="main-btn btn-bugs" onclick="openForm('bugs')">
                🐛 Баги
            </button>
            <button class="main-btn btn-tasks" onclick="openForm('tasks')">
                ✅ Задачи
            </button>
            <button class="main-btn btn-library" onclick="openForm('library')">
                📚 Электронная библиотека
            </button>
        </div>
    </div>

    <!-- Модальное окно формы -->
    <div class="form-modal" id="formModal">
        <div class="form-container">
            <span class="close-btn" onclick="closeForm()">&times;</span>
            
            <div id="formContent">
                <h2 class="form-title" id="formTitle">Форма заявки</h2>
                
                <form id="requestForm" onsubmit="submitForm(event)">
                    <input type="hidden" id="requestType" name="requestType">
                    
                    <div class="form-group">
                        <label for="name">Ваше имя *</label>
                        <input type="text" id="name" name="name" required placeholder="Иван Иванов">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required placeholder="example@mail.ru">
                    </div>
                    
                    <div class="form-group">
                        <label for="department">Отдел</label>
                        <select id="department" name="department">
                            <option value="">Выберите отдел</option>
                            <option value="IT">IT отдел</option>
                            <option value="HR">HR отдел</option>
                            <option value="Sales">Отдел продаж</option>
                            <option value="Marketing">Маркетинг</option>
                            <option value="Finance">Финансы</option>
                            <option value="Other">Другой</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Тема *</label>
                        <input type="text" id="subject" name="subject" required placeholder="Краткое описание проблемы/задачи">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Описание *</label>
                        <textarea id="description" name="description" required placeholder="Подробно опишите проблему, задачу или запрос..."></textarea>
                    </div>
                    
                    <div class="form-group" id="priorityGroup">
                        <label for="priority">Приоритет</label>
                        <select id="priority" name="priority">
                            <option value="Low">Низкий</option>
                            <option value="Medium" selected>Средний</option>
                            <option value="High">Высокий</option>
                            <option value="Critical">Критический</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">
                        Отправить заявку
                    </button>
                </form>
            </div>
            
            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>Заявка успешно отправлена!</h3>
                <p>Ваша заявка была зарегистрирована и скоро будет обработана.</p>
                <button class="submit-btn" onclick="closeForm()" style="margin-top: 20px;">
                    Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация - замените на ваш Google Apps Script URL
        const GOOGLE_SCRIPTS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';
        
        let currentFormType = '';

        function openForm(type) {
            currentFormType = type;
            const modal = document.getElementById('formModal');
            const formTitle = document.getElementById('formTitle');
            const requestType = document.getElementById('requestType');
            const priorityGroup = document.getElementById('priorityGroup');
            
            // Настройка заголовка и типа формы
            switch(type) {
                case 'bugs':
                    formTitle.textContent = '🐛 Сообщение о баге';
                    requestType.value = 'Bug';
                    priorityGroup.style.display = 'block';
                    break;
                case 'tasks':
                    formTitle.textContent = '✅ Новая задача';
                    requestType.value = 'Task';
                    priorityGroup.style.display = 'block';
                    break;
                case 'library':
                    formTitle.textContent = '📚 Запрос в электронную библиотеку';
                    requestType.value = 'Library';
                    priorityGroup.style.display = 'none';
                    break;
            }
            
            // Сброс формы
            document.getElementById('requestForm').reset();
            document.getElementById('requestForm').style.display = 'block';
            document.getElementById('successMessage').classList.remove('active');
            
            modal.classList.add('active');
        }

        function closeForm() {
            document.getElementById('formModal').classList.remove('active');
        }

        // Закрытие по клику вне формы
        document.getElementById('formModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeForm();
            }
        });

        async function submitForm(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
            
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            
            // Добавляем метку времени
            data.timestamp = new Date().toISOString();
            
            try {
                // Отправка данных в Google Таблицы через Google Apps Script
                const response = await fetch(GOOGLE_SCRIPTS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                // Показываем сообщение об успехе
                document.getElementById('requestForm').style.display = 'none';
                document.getElementById('successMessage').classList.add('active');
                
                // Логирование для отладки (в реальном приложении можно убрать)
                console.log('Заявка отправлена:', data);
                
            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('Произошла ошибка при отправке заявки. Пожалуйста, попробуйте позже.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }

        // Обработка клавиши Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeForm();
            }
        });
    </script>
</body>
</html>
